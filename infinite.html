<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Arkanoid - Infinite Mode</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="game" tabindex="0"></canvas>

<div class="controls">
    <button id="btn-home" class="mode-btn" type="button" onclick="location.href='index.html'">메인으로</button>
    <button id="btn-reset" class="mode-btn" type="button">다시 시작</button>
    <label class="slider-wrap" for="speed-slider">
        <span>공 속도</span>
        <input id="speed-slider" type="range" min="0.5" max="2.0" step="0.05" value="1.0" />
        <output id="speed-value">100%</output>
    </label>
</div>

<!-- 업그레이드 선택 모달 -->
<div id="upgrade-backdrop" class="modal-backdrop" hidden>
    <div class="modal upgrade-modal" role="dialog" aria-modal="true">
        <h2 id="upgrade-title">LEVEL UP!</h2>
        <p class="upgrade-subtitle">강화 모듈을 선택하세요</p>
        <div id="upgrade-choices" class="upgrade-list">
            <!-- 자바스크립트에서 동적 생성 -->
        </div>
    </div>
</div>

<script type="module" src="js/infinite.js"></script>
</body>
</html>
