<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Arkanoid - Main Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="stylesheet" href="style.css">
</head>
<body class="menu-body">
    <div class="menu-container">
        <header class="menu-header">
            <h1>ARKANOID</h1>
            <p class="subtitle">NEON EVOLUTION</p>
        </header>
        
        <nav class="menu-nav">
            <a href="classic.html" class="menu-item">
                <span class="mode-title">CLASSIC</span>
                <span class="mode-desc">전통적인 알카노이드의 맛</span>
            </a>
            <a href="infinite.html" class="menu-item">
                <span class="mode-title">INFINITE</span>
                <span class="mode-desc">로그라이크 방식의 무한 도전</span>
            </a>
            <a href="stage.html" class="menu-item">
                <span class="mode-title">STAGE</span>
                <span class="mode-desc">단계별 시스템 코어 파괴</span>
            </a>
        </nav>

        <footer class="menu-footer">
            <p>&copy; 2026 Arkanoid Evolution Project | <a href="#" id="view-updates" style="color: inherit; text-decoration: none;">v1.1.1-hotfix-1</a></p>
        </footer>
    </div>

    <!-- 업데이트 내역 모달 -->
    <div id="updates-backdrop" class="modal-backdrop" hidden>
        <div class="modal help-panel" style="border-color: var(--neon-cyan); box-shadow: 0 0 30px rgba(0, 243, 255, 0.2); max-width: 500px;">
            <h2 style="color: var(--neon-cyan);">업데이트 내역</h2>
            <div id="updates-list" style="max-height: 400px; overflow-y: auto; padding-right: 10px; display: flex; flex-direction: column; gap: 20px;">
                <!-- 내용이 여기에 동적으로 삽입됩니다 -->
            </div>
            <div class="modal-actions">
                <button id="updates-close" class="secondary" type="button">닫기</button>
            </div>
        </div>
    </div>

    <script type="module" src="js/menu.js"></script>
</body>
</html>
